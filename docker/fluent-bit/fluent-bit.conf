[SERVICE]
    Flush        2
    Daemon       Off
    Log_Level    warn

# Tail the log file written by the CS2 container's entrypoint wrapper.
# The file lives on a shared Docker volume (cs2_logs) mounted read-only here.
[INPUT]
    Name             tail
    Path             /logs/cs2/server.log
    Tag              cs2.server
    Refresh_Interval 2
    Read_from_Head   true

[FILTER]
    Name    record_modifier
    Match   cs2.*
    Record  service.name  cs2-server
    Record  log.source    server_console

# Forward to the OTel Collector over OTLP HTTP.
# The Collector's existing log pipeline routes everything to Loki.
[OUTPUT]
    Name         opentelemetry
    Match        cs2.*
    Host         otel-collector
    Port         4318
    Logs_uri     /v1/logs
    tls          off
    tls.verify   off
