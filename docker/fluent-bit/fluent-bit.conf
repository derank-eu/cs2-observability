[SERVICE]
    Flush        2
    Daemon       Off
    Log_Level    warn

# Receives log records forwarded by the Docker fluentd log driver.
[INPUT]
    Name         forward
    Listen       0.0.0.0
    Port         24224

# Add attributes so Loki/Grafana can distinguish raw server output
# from the plugin's structured game events.
[FILTER]
    Name         record_modifier
    Match        cs2.*
    Record       service.name  cs2-server
    Record       log.source    server_console

# Forward to the OTel Collector over OTLP HTTP.
# The Collector's existing log pipeline routes everything to Loki.
[OUTPUT]
    Name              opentelemetry
    Match             cs2.*
    Host              otel-collector
    Port              4318
    Logs_uri          /v1/logs
    tls               off
    tls.verify        off
